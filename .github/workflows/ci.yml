name: CI

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install -g @anthropic-ai/claude-code

      - name: Run
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ""
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          sleep $((RANDOM % 1800))
          git clone https://x-access-token:${{ secrets.AGENT_REPO_TOKEN }}@github.com/JoelAlfred1997/ml-build-tools.git /tmp/tools
          unset ANTHROPIC_API_KEY
          python /tmp/tools/build.py

      - name: Configure git
        run: |
          git config user.name "${{ vars.COMMIT_AUTHOR_NAME }}"
          git config user.email "${{ secrets.COMMIT_AUTHOR_EMAIL }}"

      - name: Commit
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          if [ ! -f /tmp/commit_message.txt ]; then
            echo "::error::No commit message produced."
            exit 1
          fi
          git commit -m "$(cat /tmp/commit_message.txt)"
          git push origin HEAD