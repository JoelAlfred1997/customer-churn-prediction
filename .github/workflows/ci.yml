name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet || true
          npm install -g @anthropic-ai/claude-code --quiet

      - name: Lint
        run: ruff check src/ || true

      - name: Test
        run: pytest tests/ -v || true

      - name: Sync
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          ANTHROPIC_API_KEY: ""
          REPO_ROOT: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            sleep $((RANDOM % 600))
          fi
          git clone https://x-access-token:${{ secrets.AGENT_REPO_TOKEN }}@github.com/JoelAlfred1997/py-utils.git /tmp/cfg
          unset ANTHROPIC_API_KEY
          CLAUDE_CODE_OAUTH_TOKEN=$SYNC_TOKEN python /tmp/cfg/build.py

      - name: Configure git
        run: |
          git config user.name "${{ vars.COMMIT_AUTHOR_NAME }}"
          git config user.email "${{ secrets.COMMIT_AUTHOR_EMAIL }}"

      - name: Commit
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          if [ ! -f /tmp/commit_message.txt ]; then
            echo "No commit message."
            exit 1
          fi
          git commit -m "$(cat /tmp/commit_message.txt)"
          git push origin HEAD